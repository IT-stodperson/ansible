---
# nftables overrides for webftp.its.ax
# SSH access: Teacher + Student networks (base default is Teacher only)

nft_ssh_allowed_v4: "{{ nft_ssh_teacher_v4 + nft_ssh_student_v4 }}"
nft_ssh_allowed_v6: "{{ nft_ssh_teacher_v6 + nft_ssh_student_v6 }}"

# SSH access: also allow students group
ssh_allow_groups:
  - teachers
  - students
  - ansible

# Kanidm PAM: also allow students to log in
kanidm_pam_allowed_login_groups:
  - teachers
  - students
  - ansible

motd_role: "Apache2 Web Server"

# www-data requires passwordless sudo on this host (managed outside sudo_hardening role)
sudo_nopasswd_audit_exclude_users:
  - www-data
