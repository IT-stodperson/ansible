---
# Bootstrap Playbook — Initial server setup
#
# Connects as root to install sudo and deploy Kanidm centralised
# authentication.  This playbook is designed to run ONCE per host,
# before any other playbooks.  After bootstrap, all subsequent
# playbooks connect as the 'ansible' user provisioned by Kanidm.
#
# Prerequisites:
#   - vault_root_password must be defined in inventory/group_vars/all/vault.yml
#   - vault_kanidm_unixd_token must be defined in inventory/group_vars/all/vault.yml
#
# Usage:
#   Single host:
#     ansible-playbook playbooks/bootstrap.yml --limit <new-host>
#
#   Dry run:
#     ansible-playbook playbooks/bootstrap.yml --limit <new-host> --check --diff

- name: Bootstrap — Initial server setup
  hosts: debian_servers
  become: true
  remote_user: root
  vars:
    ansible_password: "{{ vault_root_password }}"
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

  pre_tasks:
    - name: Ensure sudo is installed
      ansible.builtin.apt:
        name: sudo
        state: present
        update_cache: true

  roles:
    - role: kanidm
      tags: kanidm
