---
# nftables firewall hardening for Debian servers.
#
# Usage:
#   Deploy base config to all servers:
#     ansible-playbook playbooks/nftables-hardening.yml
#
#   Deploy to a specific server (with host-specific rules if they exist):
#     ansible-playbook playbooks/nftables-hardening.yml --limit wazuh.its.ax
#
#   Force overwrite a manually modified config:
#     ansible-playbook playbooks/nftables-hardening.yml -e nft_force_overwrite=true
#
#   Dry run to see what would change:
#     ansible-playbook playbooks/nftables-hardening.yml --check --diff

- name: nftables firewall hardening — Debian
  hosts: debian_servers
  become: true
  roles:
    - role: nftables
