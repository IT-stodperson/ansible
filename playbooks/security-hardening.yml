---
# Security Hardening Playbook — Debian
#
# Applies all hardening roles to Debian servers in a logical order:
# bootloader and kernel first, then accounts and authentication,
# followed by access control, network, and finally monitoring.
#
# Usage:
#   Full run:
#     ansible-playbook playbooks/security-hardening.yml
#
#   Run specific sections via tags:
#     ansible-playbook playbooks/security-hardening.yml --tags sudo
#
#   Dry run:
#     ansible-playbook playbooks/security-hardening.yml --check --diff

- name: Security Hardening Playbook — Debian
  hosts: debian_servers
  become: true
  roles:
    - role: grub_hardening
      tags: grub
    - role: kernel_hardening
      tags: kernel
    - role: accounts_hardening
      tags: accounts
    - role: pam_hardening
      tags: pam
    - role: ssh_hardening
      tags: ssh
    - role: cron_hardening
      tags: cron
    - role: apt_hardening
      tags: apt
    - role: apparmor
      tags: apparmor
    - role: nftables
      tags: nftables
    - role: logging_auditing
      tags: logging
    - role: ntp
      tags: ntp
    - role: systemd_hardening
      tags: systemd

  post_tasks:
    # pam_hardening can rebuild the PAM stack and drop pam_kanidm.so if its
    # handler fires.  Re-assert kanidm PAM here so the two playbooks never
    # drift out of sync regardless of which one was run last.
    - name: Check Kanidm PAM module is present in common-auth
      ansible.builtin.command:
        cmd: grep -q pam_kanidm /etc/pam.d/common-auth
      register: _sec_kanidm_pam_check
      failed_when: false
      changed_when: false
      tags:
        - pam
        - kanidm_pam

    - name: Re-enable Kanidm PAM profile if missing
      ansible.builtin.command:
        cmd: pam-auth-update --enable kanidm --force
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: _sec_kanidm_pam_check.rc != 0
      tags:
        - pam
        - kanidm_pam
