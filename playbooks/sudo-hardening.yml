---
- name: Sudo hardening for Debian servers
  hosts: debian_servers
  become: true

  tasks:
    # ===========================================================================
    # DEPLOY SUDOERS CONFIG
    # ===========================================================================

    - name: Deploy sudo security hardening configuration
      ansible.builtin.template:
        src: 10_sudo-hardening.j2
        dest: /etc/sudoers.d/10_sudo-hardening
        owner: root
        group: root
        mode: '0440'
        trim_blocks: true
        validate: visudo -c -f %s

    # ===========================================================================
    # FILE PERMISSIONS
    # ===========================================================================

    - name: Set permissions on /etc/sudoers
      ansible.builtin.file:
        path: /etc/sudoers
        owner: root
        group: root
        mode: '0440'
        follow: true

    - name: Find all sudoers.d files
      ansible.builtin.find:
        paths: /etc/sudoers.d
        follow: true
        patterns: '*'
      register: sudoers_files

    - name: Set permissions on sudoers.d files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: root
        group: root
        mode: '0440'
        follow: true
      loop: "{{ sudoers_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    # ===========================================================================
    # NOPASSWD AUDIT
    # ===========================================================================

    - name: Audit NOPASSWD entries in sudoers files
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -rn "^[^#]*NOPASSWD" /etc/sudoers /etc/sudoers.d/ 2>/dev/null || true
        executable: /bin/bash
      register: nopasswd_audit
      changed_when: false

    - name: Report NOPASSWD entries found
      ansible.builtin.debug:
        msg: >-
          NOPASSWD AUDIT [{{ inventory_hostname }}] —
          Found {{ nopasswd_audit.stdout_lines | length }} entry/entries:
          {{ nopasswd_audit.stdout_lines | join(' | ') }}
      when: nopasswd_audit.stdout | length > 0

    - name: Confirm no NOPASSWD entries found
      ansible.builtin.debug:
        msg: "NOPASSWD AUDIT [{{ inventory_hostname }}] — No entries found."
      when: nopasswd_audit.stdout | length == 0
