---
# Deploy a host-specific dynamic MOTD script.
#
# Usage:
#   ansible-playbook playbooks/motd-deploy.yml --limit wazuh.its.ax -e motd_script=10-custom-wazuh
#   ansible-playbook playbooks/motd-deploy.yml --limit webftp.its.ax -e motd_script=10-custom-webftp
#   ansible-playbook playbooks/motd-deploy.yml --limit ansible.its.ax -e motd_script=10-custom-ansible
#
# MOTD templates are stored in: roles/motd/templates/scripts/
# Named as: <script-name>.j2 (e.g., 10-custom-wazuh.j2)

- name: Deploy dynamic MOTD script
  hosts: debian_servers
  become: true

  tasks:
    - name: Deploy MOTD script
      ansible.builtin.include_role:
        name: motd
        tasks_from: deploy_script
