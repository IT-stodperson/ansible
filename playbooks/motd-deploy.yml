---
# Deploy dynamic MOTD to Debian servers.
#
# The correct per-host MOTD sections are applied automatically based on
# inventory_hostname — no need to specify which script to deploy.
#
# Usage:
#   ansible-playbook playbooks/motd-deploy.yml
#   ansible-playbook playbooks/motd-deploy.yml --limit wazuh.its.ax
#   ansible-playbook playbooks/motd-deploy.yml --check --diff

- name: Deploy dynamic MOTD
  hosts: debian_servers
  become: true
  roles:
    - role: motd
