---
- name: Ensure {{ pam_su_group }} group exists
  ansible.builtin.group:
    name: "{{ pam_su_group }}"
    state: present

- name: Restrict su command to {{ pam_su_group }} group via PAM
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?\s*auth\s+required\s+pam_wheel\.so'
    line: "auth required pam_wheel.so use_uid group={{ pam_su_group }}"
    mode: '0644'
