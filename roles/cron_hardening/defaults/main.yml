---
# Default variables for the cron_hardening role.
# Override these in group_vars/, host_vars/, or at the playbook level.

# ---------------------------------------------------------------------------
# Access control
# ---------------------------------------------------------------------------
# Users allowed to use cron (root always has access on Debian).
# Add users here if needed, e.g.: ["admin", "backup"]
cron_allowed_users: []

# ---------------------------------------------------------------------------
# Directory and file permissions
# ---------------------------------------------------------------------------
# Cron directories to enforce root:root 0700 on.
# /etc/crontab is handled separately with mode 0600.
cron_directories:
  - /etc/cron.hourly
  - /etc/cron.daily
  - /etc/cron.weekly
  - /etc/cron.monthly
  - /etc/cron.yearly
  - /etc/cron.d
