---
# handlers file for kernel_hardening
- name: Apply sysctl configuration
  listen: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl -p /etc/sysctl.d/60-kernel-hardening.conf
  register: _sysctl_reload
  changed_when: _sysctl_reload.rc == 0
  failed_when: >-
    _sysctl_reload.stderr_lines |
    reject('match', '^sysctl: permission denied on key') |
    list | length > 0
  become: true
  
- name: Recommend reboot if sysctl parameters were denied
  listen: Reload sysctl
  ansible.builtin.debug:
    msg: >-
      WARNING: Some sysctl parameters could not be applied due to kernel
      lockdown (Secure Boot). A reboot is recommended so that
      systemd-sysctl.service can apply all parameters at next boot.
      Denied keys: {{ _sysctl_reload.stderr_lines |
      select('match', '^sysctl: permission denied on key') |
      list | join('; ') }}
  when:
    - _sysctl_reload.stderr_lines |
      select('match', '^sysctl: permission denied on key') |
      list | length > 0
  changed_when: false
