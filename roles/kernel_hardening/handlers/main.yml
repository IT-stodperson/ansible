---
# handlers file for kernel_hardening

- name: Apply sysctl configuration
  listen: Reload sysctl
  ansible.builtin.shell:
    cmd: |
      sysctl_errors=$(sysctl -p /etc/sysctl.d/60-kernel-hardening.conf 2>&1 1>/dev/null)
      unexpected=$(echo "$sysctl_errors" | grep -v 'permission denied on key' | grep -v '^$')
      if [ -n "$unexpected" ]; then
        echo "$unexpected" >&2
        exit 1
      fi
    executable: /bin/bash
  changed_when: true
  become: true
