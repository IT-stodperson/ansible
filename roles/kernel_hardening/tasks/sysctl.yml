---
# kernel_hardening — sysctl security parameters

- name: Deploy sysctl hardening configuration
  ansible.builtin.template:
    src: 60-kernel-hardening.conf.j2
    dest: /etc/sysctl.d/60-kernel-hardening.conf
    owner: root
    group: root
    mode: '0644'
    trim_blocks: true
  notify: Reload sysctl
