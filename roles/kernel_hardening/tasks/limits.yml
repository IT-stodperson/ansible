# kernel_hardening — process and core dump limits

- name: Deploy core dump and process limits
  ansible.builtin.template:
    src: 10-coredump-debian.conf.j2
    dest: /etc/security/limits.d/10-coredump-debian.conf
    owner: root
    group: root
    mode: '0644'
    trim_blocks: true
