---
# APT package integrity, patch management, and automatic update tools.

# ===========================================================================
# PACKAGE INTEGRITY TOOLS
# ===========================================================================

- name: Install debsums for package integrity verification
  ansible.builtin.apt:
    name: debsums
    state: present
  when: apt_install_debsums

- name: Install apt-show-versions for patch management
  ansible.builtin.apt:
    name: apt-show-versions
    state: present
  when: apt_install_apt_show_versions

# ===========================================================================
# UNATTENDED UPGRADES
# ===========================================================================

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  when: apt_unattended_upgrades_enabled

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'
  when: apt_unattended_upgrades_enabled

- name: Configure APT periodic updates
  ansible.builtin.template:
    src: 20auto-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
  when: apt_unattended_upgrades_enabled

- name: Enable apt-daily timer
  ansible.builtin.systemd_service:
    name: apt-daily.timer
    enabled: true
    state: started
  when: apt_unattended_upgrades_enabled

- name: Enable apt-daily-upgrade timer
  ansible.builtin.systemd_service:
    name: apt-daily-upgrade.timer
    enabled: true
    state: started
  when: apt_unattended_upgrades_enabled
