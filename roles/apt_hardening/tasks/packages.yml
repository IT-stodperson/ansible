---
# APT package integrity, patch management, and automatic update tools.

# ===========================================================================
# PACKAGE INTEGRITY TOOLS
# ===========================================================================

- name: Install debsums for package integrity verification
  when: apt_install_debsums
  ansible.builtin.apt:
    package: debsums
    state: present

- name: Configure debsums cron job (PKGS-7370)
  when: apt_install_debsums
  ansible.builtin.template:
    src: debsums.j2
    dest: /etc/default/debsums
    owner: root
    group: root
    mode: '0644'

- name: Install apt-show-versions for patch management
  when: apt_install_apt_show_versions
  ansible.builtin.apt:
    package: apt-show-versions
    state: present

- name: Install apt-transport-https for HTTPS repository support
  when: apt_install_apt_transport_https
  ansible.builtin.apt:
    package: apt-transport-https
    state: present

# ===========================================================================
# UNATTENDED UPGRADES
# ===========================================================================

- name: Install unattended-upgrades
  when: apt_unattended_upgrades_enabled
  ansible.builtin.apt:
    package: unattended-upgrades
    state: present

- name: Configure unattended-upgrades
  when: apt_unattended_upgrades_enabled
  ansible.builtin.template:
    src: 50unattended-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'

- name: Configure APT periodic updates
  when: apt_unattended_upgrades_enabled
  ansible.builtin.template:
    src: 20auto-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'

- name: Enable apt-daily timer
  when: apt_unattended_upgrades_enabled
  ansible.builtin.systemd_service:
    name: apt-daily.timer
    enabled: true
    state: started

- name: Enable apt-daily-upgrade timer
  when: apt_unattended_upgrades_enabled
  ansible.builtin.systemd_service:
    name: apt-daily-upgrade.timer
    enabled: true
    state: started
