---
# tasks file for login_banners

# =============================================================================
# Login Banners — Main task entry point
# =============================================================================

- name: Deploy login banners
  ansible.builtin.import_tasks: banners.yml
  tags:
    - login_banners
    - login_banners_deploy

- name: Remove static MOTD files
  ansible.builtin.import_tasks: motd.yml
  when: login_banners_remove_motd
  tags:
    - login_banners
    - login_banners_motd
