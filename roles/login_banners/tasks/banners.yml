---
# Login banner deployment — /etc/issue and /etc/issue.net
#
# NOTE: banner.txt is deliberately kept as a static file (not a template)
# because its content is displayed verbatim to users on SSH/console login.
# An Ansible-managed header would be visible to every connecting user.

- name: Deploy login banner (local console)
  ansible.builtin.copy:
    src: "{{ login_banners_src }}"
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"
  tags:
    - login_banners
    - login_banners_deploy

- name: Deploy login banner (SSH/network)
  ansible.builtin.copy:
    src: "{{ login_banners_src }}"
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
  tags:
    - login_banners
    - login_banners_deploy
