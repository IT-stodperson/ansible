---
# Default variables for the motd role.
# Override these in group_vars/, host_vars/, or at the playbook level.

# ---------------------------------------------------------------------------
# Cache timer settings
# ---------------------------------------------------------------------------
motd_cache_timer_boot_delay: "2min"
motd_cache_timer_interval: "6h"

# ---------------------------------------------------------------------------
# MOTD display settings
# ---------------------------------------------------------------------------
# Server role label shown in the MOTD header.
# Override in host_vars/ for each server.
motd_role: "Server"
