---
# tasks file for motd

# =============================================================================
# MOTD — Main task entry point
# =============================================================================
# Deploys:
#   1. Cache update script, systemd service/timer, and APT hook
#   2. Combined base + per-host MOTD script (auto-selects per-host snippets)
#
# Per-host MOTD sections are included automatically from
# templates/scripts/per_host/<hostname>_*.j2 using Jinja2 includes,
# similar to the nftables role's per_host/ snippet architecture.
#
# Usage:
#   ansible-playbook playbooks/motd-deploy.yml
#   ansible-playbook playbooks/motd-deploy.yml --limit wazuh.its.ax

- name: Deploy MOTD cache infrastructure
  ansible.builtin.import_tasks:
    file: cache_infrastructure.yml
  tags:
    - motd
    - motd_cache

- name: Deploy MOTD script
  ansible.builtin.import_tasks:
    file: deploy_script.yml
  tags:
    - motd
    - motd_script
