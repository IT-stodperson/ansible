---
# Deploy the combined base + per-host dynamic MOTD script.
# Per-host sections are included automatically from per_host/<hostname>_*.j2
# using Jinja2 includes with 'ignore missing', similar to the nftables role.

- name: Deploy dynamic MOTD script — 10-sysinfo
  ansible.builtin.template:
    src: "scripts/10-sysinfo.j2"
    dest: "/etc/update-motd.d/10-sysinfo"
    owner: root
    group: root
    mode: '0755'
    trim_blocks: true

- name: Remove legacy per-host MOTD scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    state: absent
  loop:
    - 10-custom-ansible
    - 10-custom-wazuh
    - 10-custom-webftp
    - 10-custom-kanidm
