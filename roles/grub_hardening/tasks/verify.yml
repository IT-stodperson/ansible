---
# grub_hardening — verification checks

- name: Check GRUB superusers entry
  ansible.builtin.command:
    cmd: grep -qE "^set superusers" /boot/grub/grub.cfg
  register: _grub_superusers
  changed_when: false
  failed_when: false

- name: Check GRUB password_pbkdf2 entry
  ansible.builtin.command:
    cmd: grep -qE "^password_pbkdf2" /boot/grub/grub.cfg
  register: _grub_password
  changed_when: false
  failed_when: false

- name: Check GRUB unrestricted menuentry_id_option
  ansible.builtin.command:
    cmd: grep -qE '^set menuentry_id_option="--unrestricted' /boot/grub/grub.cfg
  register: _grub_unrestricted
  changed_when: false
  failed_when: false

- name: Assert GRUB password protection is properly configured
  ansible.builtin.assert:
    that:
      - _grub_superusers.rc == 0
      - _grub_password.rc == 0
      - _grub_unrestricted.rc == 0
    fail_msg: >-
      GRUB password protection is not fully configured in /boot/grub/grub.cfg.
      Expected a 'set superusers' line, a 'password_pbkdf2' line, and
      'set menuentry_id_option="--unrestricted ...' before menu entries.
    success_msg: GRUB password protection is properly configured.
