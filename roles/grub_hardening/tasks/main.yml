---
# tasks file for grub_hardening

# =============================================================================
# GRUB Hardening — Main task entry point
# =============================================================================

- name: Configure GRUB password protection
  ansible.builtin.import_tasks:
    file: grub_password.yml
  tags:
    - grub
    - grub_password

- name: Configure boot parameters and unrestricted boot
  ansible.builtin.import_tasks:
    file: boot_parameters.yml
  tags:
    - grub
    - grub_boot_params

- name: Lock down GRUB file permissions
  ansible.builtin.import_tasks:
    file: permissions.yml
  tags:
    - grub
    - grub_permissions

- name: Flush handlers to regenerate grub.cfg before verification
  ansible.builtin.meta: flush_handlers

- name: Verify GRUB hardening
  ansible.builtin.import_tasks:
    file: verify.yml
  tags:
    - grub
    - grub_verify
