---
# grub_hardening — GRUB password protection

- name: Generate GRUB PBKDF2 password hash
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      printf '%s\n' "{{ vault_grub_password }}" "{{ vault_grub_password }}" | \
        grub-mkpasswd-pbkdf2 \
          --iteration-count={{ grub_pbkdf2_iterations }} \
          --salt={{ grub_pbkdf2_salt_length }} | \
        grep -o 'grub\.pbkdf2\.sha512\..*'
    executable: /bin/bash
  register: grub_hash
  changed_when: false
  no_log: true

- name: Deploy GRUB password configuration (50_hardening)
  ansible.builtin.template:
    src: 50_hardening.j2
    dest: /etc/grub.d/50_hardening
    owner: root
    group: root
    mode: "0755"
  notify: Update GRUB
  no_log: true
