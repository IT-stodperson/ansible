---
# grub_hardening — unrestricted boot and kernel boot parameters

- name: Ensure --unrestricted is set in 10_linux CLASS variable
  ansible.builtin.lineinfile:
    path: /etc/grub.d/10_linux
    regexp: '^CLASS="--class gnu-linux --class gnu --class os'
    line: 'CLASS="--class gnu-linux --class gnu --class os --unrestricted"'
    backrefs: false
    mode: "0755"
  notify: Update GRUB

- name: Deploy GRUB hardening boot parameters
  ansible.builtin.template:
    src: 60-hardening.cfg.j2
    dest: /etc/default/grub.d/60-hardening.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Update GRUB
