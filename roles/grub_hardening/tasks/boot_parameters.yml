---
# grub_hardening — unrestricted boot and kernel boot parameters

- name: Remove --unrestricted from 10_linux CLASS variable (migrating to 09_unrestricted)
  ansible.builtin.lineinfile:
    path: /etc/grub.d/10_linux
    regexp: '^(CLASS="--class gnu-linux --class gnu --class os) --unrestricted(")'
    line: '\1\2'
    backrefs: true
    mode: '0755'
  notify: Update GRUB

- name: Deploy GRUB unrestricted boot script
  ansible.builtin.template:
    src: 09_unrestricted.j2
    dest: /etc/grub.d/09_unrestricted
    owner: root
    group: root
    mode: '0755'
  notify: Update GRUB

- name: Deploy GRUB hardening boot parameters
  ansible.builtin.template:
    src: 60-hardening.cfg.j2
    dest: /etc/default/grub.d/60-hardening.cfg
    owner: root
    group: root
    mode: '0644'
  notify: Update GRUB
