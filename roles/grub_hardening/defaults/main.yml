---
# Default variables for the grub_hardening role.
# Override these in group_vars/, host_vars/, or at the playbook level.

# ---------------------------------------------------------------------------
# GRUB password (superuser)
# ---------------------------------------------------------------------------

# The GRUB superuser account name
grub_superuser: root

# PBKDF2 iteration count (higher = slower brute force)
grub_pbkdf2_iterations: 600000

# PBKDF2 salt length in bytes
grub_pbkdf2_salt_length: 64

# NOTE: vault_grub_password must be defined in your Ansible Vault or
# host/group vars. This role does not provide a default for it.

# ---------------------------------------------------------------------------
# Kernel boot parameters
# ---------------------------------------------------------------------------

# Extra parameters appended to GRUB_CMDLINE_LINUX for hardening.
# Each entry becomes a separate kernel command-line argument.
grub_cmdline_linux_hardening:
  - apparmor=1
  - security=apparmor
  - audit=1
  - audit_backlog_limit=8192
  - usbcore.nousb
