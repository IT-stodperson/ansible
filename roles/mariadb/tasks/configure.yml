---
# Deploy the MariaDB hardening configuration and ensure required directories
# exist before the service is started.

- name: Ensure MariaDB log directory exists
  ansible.builtin.file:
    path: "{{ mariadb_log_dir }}"
    state: directory
    owner: mysql
    group: mysql
    mode: '0750'

- name: Ensure mysql-files directory exists (secure-file-priv target)
  ansible.builtin.file:
    path: /var/lib/mysql-files
    state: directory
    owner: mysql
    group: mysql
    mode: '0750'

- name: Deploy hardening configuration
  ansible.builtin.template:
    src: 99-hardening.cnf.j2
    dest: "{{ mariadb_hardening_config }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart mariadb
