---
# Configure NTP via systemd-timesyncd.

- name: Ensure timesyncd config directory exists
  ansible.builtin.file:
    path: /etc/systemd/timesyncd.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
    follow: true

- name: Deploy timesyncd configuration
  ansible.builtin.template:
    src: 60-timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf.d/60-timesyncd.conf
    owner: root
    group: root
    mode: '0644'
    trim_blocks: true
  notify: Restart timesyncd

- name: Ensure systemd-timesyncd is enabled and running
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
