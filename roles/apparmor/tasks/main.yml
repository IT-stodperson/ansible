---
# AppArmor hardening for Debian servers.

- name: Install AppArmor and utilities
  ansible.builtin.apt:
    package:
      - apparmor
      - apparmor-utils
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure AppArmor service is enabled and running
  ansible.builtin.systemd:
    name: apparmor
    enabled: true
    state: started

- name: Find AppArmor profile files
  ansible.builtin.find:
    paths: /etc/apparmor.d
    depth: 1
    file_type: file
  register: apparmor_files

- name: Validate AppArmor profiles
  ansible.builtin.command:
    cmd: "apparmor_parser -p {{ item.path }}"
  loop: "{{ apparmor_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  register: apparmor_validation
  failed_when: false
  changed_when: false

- name: Report invalid AppArmor profiles that will be skipped
  ansible.builtin.debug:
    msg: "Skipping invalid AppArmor profile: {{ item.item.path }} — {{ item.stderr | trim }}"
  loop: "{{ apparmor_validation.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: item.rc != 0

- name: Enforce valid AppArmor profiles
  ansible.builtin.command:
    cmd: "aa-enforce {{ item.item.path }}"
  loop: "{{ apparmor_validation.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: item.rc == 0
  register: aa_enforce_result
  changed_when: "'Setting' in aa_enforce_result.stdout"

- name: Set specified profiles to complain mode
  ansible.builtin.command:
    cmd: "aa-complain {{ item }}"
  loop: "{{ apparmor_complain_profiles }}"
  when: apparmor_complain_profiles | length > 0
  register: aa_complain_result
  changed_when: "'Setting' in aa_complain_result.stdout"

- name: Disable specified AppArmor profiles persistently
  loop: "{{ apparmor_remove_profiles }}"
  when: apparmor_remove_profiles | length > 0
  ansible.builtin.file:
    src: /etc/apparmor.d/{{ item }}
    path: /etc/apparmor.d/disable/{{ item }}
    state: link

- name: Unload disabled AppArmor profiles from the running kernel
  ansible.builtin.command:
    cmd: "apparmor_parser -R /etc/apparmor.d/{{ item }}"
  loop: "{{ apparmor_remove_profiles }}"
  when: apparmor_remove_profiles | length > 0
  register: aa_remove_result
  changed_when: aa_remove_result.rc == 0
  failed_when:
    - aa_remove_result.rc != 0
    - "'is not loaded' not in aa_remove_result.stderr"

- name: Check that AppArmor is not disabled in GRUB defaults
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -r "apparmor=0" /etc/default/grub /etc/default/grub.d/ 2>/dev/null
    executable: /bin/bash
  register: grub_check
  changed_when: false
  failed_when: false

- name: Warn if AppArmor is disabled in GRUB
  ansible.builtin.fail:
    msg: >-
      WARNING: AppArmor is disabled via GRUB on {{ inventory_hostname }}.
      The kernel boot parameters contain 'apparmor=0'.
      This must be corrected manually:
        1. Edit the file shown above in /etc/default/grub or /etc/default/grub.d/
        2. Remove 'apparmor=0'
        3. Run 'update-grub'
        4. Reboot the server
  when: grub_check.rc == 0
