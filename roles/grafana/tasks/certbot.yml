---
# Obtain a TLS certificate for Grafana using Certbot with Cloudflare DNS
# validation. Certificate issuance is skipped if a valid cert already exists;
# renewals are handled automatically by Certbot's own systemd timer.

- name: Install Certbot and Cloudflare DNS plugin
  ansible.builtin.apt:
    package:
      - certbot
      - python3-certbot-dns-cloudflare
    state: present

- name: Ensure /root/.secrets directory exists
  ansible.builtin.file:
    path: /root/.secrets
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy Cloudflare API credentials
  ansible.builtin.template:
    src: cloudflare.ini.j2
    dest: "{{ grafana_cloudflare_credentials_path }}"
    owner: root
    group: root
    mode: '0600'

- name: Check if certificate already exists
  ansible.builtin.stat:
    path: "{{ grafana_letsencrypt_live_dir }}/fullchain.pem"
  register: grafana_cert_stat

- name: Obtain TLS certificate via Certbot DNS-01 challenge
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials {{ grafana_cloudflare_credentials_path }}
      -d {{ grafana_domain }}
      --preferred-challenges dns-01
      --non-interactive
      --agree-tos
      --email {{ grafana_certbot_email }}
  when: not (grafana_cert_stat.stat.exists | bool)
  changed_when: true

# ---------------------------------------------------------------------------
# Grant the grafana process group read access to the certificate files.
# Certbot defaults to root-only permissions; Grafana runs as the grafana
# group and needs traversal rights through the archive path.
# ---------------------------------------------------------------------------

- name: Grant grafana group read/traversal access on Let's Encrypt tree
  ansible.builtin.file:
    path: /etc/letsencrypt
    group: grafana
    mode: 'g+rx'
    state: directory
    recurse: true

# ---------------------------------------------------------------------------
# Place symlinks inside /etc/grafana/ so the Grafana config can reference
# stable paths regardless of Let's Encrypt's versioned archive names.
# ---------------------------------------------------------------------------

- name: Create symlink for Grafana TLS certificate
  ansible.builtin.file:
    src: "{{ grafana_letsencrypt_live_dir }}/fullchain.pem"
    path: "{{ grafana_cert_dir }}/grafana.crt"
    state: link
    mode: '0450'
    force: true

- name: Create symlink for Grafana TLS private key
  ansible.builtin.file:
    src: "{{ grafana_letsencrypt_live_dir }}/privkey.pem"
    path: "{{ grafana_cert_dir }}/grafana.key"
    state: link
    mode: '0450'
    force: true

- name: Set grafana group ownership on certificate symlinks
  ansible.builtin.file:
    path: "{{ item }}"
    group: grafana
    mode: '0440'
    follow: true
  loop:
    - "{{ grafana_cert_dir }}/grafana.crt"
    - "{{ grafana_cert_dir }}/grafana.key"
