---
# Install Grafana from the official Grafana Labs APT repository.

- name: Install prerequisite packages
  ansible.builtin.apt:
    package:
      - apt-transport-https
      - wget
      - gnupg
    state: present

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: "{{ grafana_apt_key_url }}"
    dest: "{{ grafana_apt_key_path }}"
    owner: root
    group: root
    mode: '0644'

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "{{ grafana_apt_repo }}"
    filename: grafana
    state: present
    update_cache: true

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
