---
# vars file for grafana

# APT repository source for Grafana packages.
grafana_apt_key_url: "https://apt.grafana.com/gpg-full.key"
grafana_apt_key_path: /etc/apt/keyrings/grafana.asc
grafana_apt_repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"

# Grafana configuration file path.
grafana_config_file: /etc/grafana/grafana.ini

# systemd drop-in directory for the port-binding capability override.
grafana_systemd_override_dir: /etc/systemd/system/grafana-server.service.d
