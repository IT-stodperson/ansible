---
# defaults file for grafana

# ============================================================================
# Domain & Network
# ============================================================================

# Fully qualified domain name for the Grafana instance.
grafana_domain: "grafana.its.ax"

# Port Grafana listens on. Values below 1024 require the systemd capability
# override (deployed automatically by this role).
grafana_http_port: 443

# ============================================================================
# TLS
# ============================================================================

# Minimum TLS version accepted by Grafana. TLS 1.3 is strongly recommended.
grafana_tls_min_version: "TLS1.3"

# Directory where certificate symlinks are placed for Grafana to read.
grafana_cert_dir: /etc/grafana

# Path to the Let's Encrypt live directory for this domain.
grafana_letsencrypt_live_dir: "/etc/letsencrypt/live/{{ grafana_domain }}"

# ============================================================================
# Certbot / Cloudflare DNS
# ============================================================================

# Path to the Cloudflare credentials file used for the DNS-01 challenge.
grafana_cloudflare_credentials_path: /root/.secrets/cloudflare.ini

# Cloudflare API token with Zone:DNS:Edit permissions for the target domain.
# Store the actual value in Ansible Vault as vault_cloudflare_dns_api_token.
grafana_cloudflare_api_token: "{{ vault_cloudflare_dns_api_token }}"

# Email address passed to certbot for Let's Encrypt account registration
# and expiry notifications.
grafana_certbot_email: "itstodperson@gymnasium.ax"

# ============================================================================
# Kanidm OAuth2 / OIDC
# ============================================================================

# Toggle the entire [auth.generic_oauth] block. Set to false to skip.
grafana_oauth_enabled: true

# OAuth2 client ID registered in Kanidm ("kanidm system oauth2 create grafana ...").
grafana_oauth_client_id: "grafana"

# Client secret returned by "kanidm system oauth2 show-basic-secret grafana".
# Store the actual value in Ansible Vault as vault_grafana_oauth_client_secret.
grafana_oauth_client_secret: "{{ vault_grafana_oauth_client_secret }}"

# OIDC scopes to request. Must match the scope map configured in Kanidm.
grafana_oauth_scopes: "openid email profile groups"

# Kanidm endpoints.
grafana_oauth_auth_url: "https://kanidm.its.ax/ui/oauth2"
grafana_oauth_token_url: "https://kanidm.its.ax/oauth2/token"
grafana_oauth_api_url: "https://kanidm.its.ax/oauth2/openid/grafana/userinfo"

# Jinja2-style path expression used to extract the login name from the
# userinfo response. "preferred_username" is the short (non-@domain) name
# when "kanidm system oauth2 prefer-short-username grafana" has been run.
grafana_oauth_login_attribute_path: "preferred_username"

# Allow users authenticating via OAuth to be granted Grafana Admin if their
# token carries the relevant role claim.
grafana_oauth_allow_assign_grafana_admin: true

# JMESPath expression evaluated against the token claims to determine the
# Grafana role assigned to the authenticating user.
#
# Kanidm sends group names as full SPNs (e.g. "teachers@kanidm.its.ax") in
# the groups claim. The domain suffix is the Kanidm domain, not the org domain.
# Run "kanidm system oauth2 update-scope-map grafana teachers openid email profile groups"
# and the equivalent for students before this will work.
#
# Valid Grafana roles: GrafanaAdmin, Admin, Editor, Viewer.
# If the expression returns empty/null, role_attribute_strict controls whether
# the user is denied (true) or falls back to the default Viewer role (false).
grafana_oauth_role_attribute_path: >-
  contains(groups[*], 'teachers@kanidm.its.ax') && 'Admin' ||
  contains(groups[*], 'students@kanidm.its.ax') && 'Viewer'

# When true, users whose token does not match role_attribute_path are denied
# login entirely. When false, they fall back to the Viewer role.
# The Kanidm scope maps are the primary access gate, so false is sufficient.
grafana_oauth_role_attribute_strict: false

# When true, Grafana will NOT update a user's organisation role on subsequent
# logins — only the initial login sets the role. Setting this to false ensures
# the role stays in sync with Kanidm group membership on every login.
grafana_oauth_skip_org_role_sync: false

# ============================================================================
# Security
# ============================================================================

# Redirect to the configured domain if the Host header does not match.
# Mitigates DNS rebinding attacks.
grafana_server_enforce_domain: true

# Space-separated list of IP addresses allowed as data source proxy targets.
# Restricts which backends Grafana will proxy datasource requests to.
grafana_security_data_source_proxy_whitelist: "10.0.99.25"

# Mark the session cookie as Secure (sent over HTTPS only).
grafana_security_cookie_secure: true

# SameSite attribute for the session cookie.
grafana_security_cookie_samesite: "strict"

# Add a Strict-Transport-Security header to all responses.
grafana_security_strict_transport_security: true

# Include the preload directive in the HSTS header.
grafana_security_strict_transport_security_preload: true

# Emit a Content-Security-Policy header.
grafana_security_content_security_policy: true

# CSP template. $NONCE and $ROOT_PATH are substituted by Grafana at runtime.
# Triple-quotes are part of the grafana.ini syntax for multi-token values.
grafana_security_content_security_policy_template: >-
  """script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"""

# ============================================================================
# Authentication
# ============================================================================

# Name of the session cookie. The __Host- prefix enforces Secure, Path=/,
# and no Domain attribute, strengthening cookie security.
grafana_auth_login_cookie_name: "__Host-grafana_session"

# Hide the Grafana version number from unauthenticated users.
grafana_auth_anonymous_hide_version: true
