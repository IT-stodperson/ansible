---
# tasks file for accounts_hardening

# =============================================================================
# Accounts Hardening — Main task entry point
# =============================================================================

- name: Configure shadow password defaults (login.defs)
  tags:
    - accounts
    - accounts_login_defs
  ansible.builtin.import_tasks:
    file: login_defs.yml

- name: Enforce password aging on existing accounts
  tags:
    - accounts
    - accounts_aging
  ansible.builtin.import_tasks:
    file: password_aging.yml

- name: Harden shell environment
  tags:
    - accounts
    - accounts_shell
  ansible.builtin.import_tasks:
    file: shell_hardening.yml
