---
# Enforce password aging on existing accounts

- name: Resolve exempt group members
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for group in {{ aging_exempt_groups | join(' ') }}; do
        getent group "$group" 2>/dev/null | awk -F: '{print $4}' | tr ',' '\n'
      done | sort -u
    executable: /bin/bash
  register: exempt_group_members
  changed_when: false
  tags:
    - accounts
    - accounts_aging

- name: Build full exemption list
  ansible.builtin.set_fact:
    aging_exempt_all: >-
      {{ (aging_exempt_users + exempt_group_members.stdout_lines) | unique }}
  tags:
    - accounts
    - accounts_aging

- name: Find existing user accounts with passwords set
  ansible.builtin.command:
    cmd: "awk -F: '($2~/^\$.+\$/) {print $1}' /etc/shadow"
  register: password_accounts
  changed_when: false
  tags:
    - accounts
    - accounts_aging

- name: Enforce password aging on existing accounts
  ansible.builtin.command:
    cmd: >-
      chage
      -m {{ shadow_pass_min_days }}
      -M {{ shadow_pass_max_days }}
      -W {{ shadow_pass_warn_age }}
      {{ item }}
  loop: "{{ password_accounts.stdout_lines | difference(aging_exempt_all) }}"
  changed_when: false
  tags:
    - accounts
    - accounts_aging

- name: Disable password expiry for exempt accounts
  ansible.builtin.command:
    cmd: chage -m 0 -M 99999 -W 7 -I -1 {{ item }}
  loop: "{{ password_accounts.stdout_lines | intersect(aging_exempt_all) }}"
  changed_when: false
  tags:
    - accounts
    - accounts_aging
