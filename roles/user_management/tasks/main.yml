---
# tasks file for user_management

# =============================================================================
# User Management — Main task entry point
# =============================================================================

# =============================================================================
# GROUP
# =============================================================================

- name: Ensure group '{{ user_management_group }}' exists
  ansible.builtin.group:
    name: "{{ user_management_group }}"
    state: present

# =============================================================================
# KANIDM NOTICE
# =============================================================================

- name: Kanidm manages users and SSH keys centrally — skipping local provisioning
  ansible.builtin.debug:
    msg: >-
      Kanidm is enabled (user_management_kanidm_enabled=true).
      Users in '{{ user_management_group }}' are resolved via Kanidm NSS
      and SSH keys are provided by kanidm_ssh_authorizedkeys.
      Local user creation and key deployment are skipped.
  when: user_management_kanidm_enabled

# =============================================================================
# USERS (skipped when Kanidm manages identities)
# =============================================================================

- name: Create users and add to '{{ user_management_group }}' group
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ user_management_group }}"
    append: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    comment: "{{ item.comment | default(omit) }}"
    create_home: true
    state: present
  loop: "{{ user_management_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: not user_management_kanidm_enabled

# =============================================================================
# SSH AUTHORIZED KEYS (skipped when Kanidm manages identities)
# =============================================================================

- name: Ensure .ssh directory exists for each user
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0700'
  loop: "{{ user_management_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: not user_management_kanidm_enabled

- name: Deploy authorized_keys for each user
  ansible.builtin.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.ssh_key }}"
    state: present
    manage_dir: false
  loop: "{{ user_management_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: not user_management_kanidm_enabled
