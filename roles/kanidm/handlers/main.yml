---
# handlers file for kanidm

- name: Restart kanidm-unixd
  ansible.builtin.systemd:
    name: kanidm-unixd
    state: restarted
    daemon_reload: true

- name: Restart kanidm-unixd-tasks
  ansible.builtin.systemd:
    name: kanidm-unixd-tasks
    state: restarted
    daemon_reload: true
