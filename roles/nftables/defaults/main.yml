---
# defaults file for nftables

# The default network interface name on Proxmox Linux VMs
nft_ingress_device:
  - "ens18"

# ============================================================================
# Ansible Control Node
# ============================================================================
# The Ansible server is always granted SSH access regardless of which
# network groups are selected for a given host.

nft_ansible_server_v4: "10.0.99.22"
nft_ansible_server_v6: "2a00:5500:c00a:99:be24:11ff:feb3:33d0"

# ============================================================================
# SSH Allowed Networks
# ============================================================================
# Split into "Teacher" (staff/management) and "Student" networks.
# Hosts can use either set or both in their nftables templates.
#
# Override these in group_vars or host_vars as needed.

# --- Teacher networks (staff/management) ---
nft_ssh_teacher_v4:
  - "10.0.20.0/24"
  - "192.168.20.0/24"    # VPN

nft_ssh_teacher_v6:
  - "2a00:5500:c00a:20::/64"

# --- Student networks ---
nft_ssh_student_v4:
  - "10.0.30.0/24"
  - "192.168.30.0/24"    # VPN

nft_ssh_student_v6:
  - "2a00:5500:c00a:30::/64"

# ============================================================================
# SSH Allowed Networks (per-host override)
# ============================================================================
# Which network groups are allowed SSH. Override in host_vars to combine
# groups, e.g. for webftp:
#   nft_ssh_allowed_v4: "{{ nft_ssh_teacher_v4 + nft_ssh_student_v4 }}"
#
# The Ansible control node (nft_ansible_server_v4/v6) is always added
# automatically by the base template — do not include it here.

nft_ssh_allowed_v4: "{{ nft_ssh_teacher_v4 }}"
nft_ssh_allowed_v6: "{{ nft_ssh_teacher_v6 }}"

# ============================================================================
# Internal Networks (for hybrid REJECT/DROP verdict)
# ============================================================================
# Internal sources get REJECT (immediate feedback for debugging).
# Everything else gets silent DROP (slows down external scanners).
#
# Override these in group_vars or host_vars as needed.

nft_internal_nets_v4:
  - "10.0.10.0/24"       # DMZ
  - "10.0.20.0/24"       # Teacher
  - "10.0.30.0/24"       # Student
  - "10.0.40.0/24"       # Storage
  - "10.0.60.0/22"       # Lab
  - "10.0.99.0/24"       # Management
  - "192.168.20.0/24"    # Teacher VPN
  - "192.168.30.0/24"    # Student VPN

nft_internal_nets_v6:
  - "2a00:5500:c00a:10::/64"   # DMZ
  - "2a00:5500:c00a:20::/64"   # Teacher
  - "2a00:5500:c00a:30::/64"   # Student
  - "2a00:5500:c00a:40::/64"   # Storage
  - "2a00:5500:c00a:60::/64"   # Lab
  - "2a00:5500:c00a:99::/64"   # Management
