---
# tasks file for nftables
#
# The base template is always deployed. Host-specific service rules are
# pulled in automatically via {% include ... ignore missing %} when a
# matching snippet exists under templates/per_host/<hostname>/.

# ===========================================================================
# INSTALL
# ===========================================================================

- name: Install nftables
  ansible.builtin.apt:
    package: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

# ===========================================================================
# DEPLOY CONFIGURATION
# ===========================================================================

- name: Deploy nftables configuration
  ansible.builtin.template:
    src: base.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0600'
    backup: true
  notify: Validate and reload nftables

# ===========================================================================
# ENABLE SERVICE
# ===========================================================================

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
