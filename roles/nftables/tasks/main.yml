---
# tasks file for nftables
#
# Template lookup order:
#   1. per_host/{{ inventory_hostname }}.conf.j2  (host-specific)
#   2. base.conf.j2                                (default ruleset)

# ===========================================================================
# INSTALL
# ===========================================================================

- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

# ===========================================================================
# DEPLOY CONFIGURATION
# ===========================================================================

- name: Check for host-specific nftables template
  ansible.builtin.stat:
    path: "{{ role_path }}/templates/per_host/{{ inventory_hostname }}.conf.j2"
  delegate_to: localhost
  become: false
  register: _nft_host_template

- name: Deploy nftables configuration
  ansible.builtin.template:
    src: "{{ _nft_host_template.stat.exists | ternary('per_host/' + inventory_hostname + '.conf.j2', 'base.conf.j2') }}"
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0600'
    backup: true
  notify: Validate and reload nftables

# ===========================================================================
# ENABLE SERVICE
# ===========================================================================

- name: Enable and start nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
